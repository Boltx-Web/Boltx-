<!DOCTYPE html>
<html lang="ar">

<head>
  <!-- إعدادات الصفحة -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOLTX</title>

  <!-- تنسيقات الموقع -->
  <style>
  /* الصفحة */
  body {
    margin: 0;
    background: #000;
    color: #b000ff;
    font-family: Arial, sans-serif;
  }

  /* الهيدر */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    gap: 15px;
    flex-wrap: wrap;
  }

  /* المحتوى الرئيسي */
  .main {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 25px;
    padding: 20px;
    max-width: 1200px;
    margin: auto;
  }

  /* قسم البوستات */
  .posts {
    flex: 1;
    max-width: 550px;
    width: 100%;
  }

  /* كل بوست */
  .post {
    width: 100%;
    background: #111;
    border: 1px solid #b000ff;
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 20px;
    box-sizing: border-box;
    box-shadow: 0 0 12px rgba(176, 0, 255, 0.15);
  }

  /* صورة البوست */
  .post img {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
  }

  /* أزرار البوست */
  .post-buttons {
    margin-top: 10px;
    display: flex;
    gap: 10px;
  }

  /* الشات */
  .chat {
    width: 350px;
    height: 560px;
    border: 2px solid #b000ff;
    border-radius: 20px;
    padding: 15px;
    background: #111;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }

  /* صندوق البوست */
  #postBox {
    max-width: 550px;
    margin: 20px auto;
    padding: 20px;
  }

  /* الفوتر */
  .footer {
    margin-top: 30px;
    padding: 20px;
    text-align: center;
    border-top: 1px solid #b000ff;
  }

  .footer a {
    color: #b000ff;
    margin: 10px;
    text-decoration: none;
  }

  /* المدخلات */
  input,
  textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: black;
    color: #b000ff;
    border: 1px solid #b000ff;
    border-radius: 5px;
    box-sizing: border-box;
  }

  /* الأزرار */
  button {
    padding: 8px 15px;
    background: #b000ff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.9;
  }

  /* موبايل */
  @media (max-width: 768px) {
    .header {
      justify-content: center;
      text-align: center;
    }

    .main {
      flex-direction: column;
      align-items: center;
      padding: 10px;
    }

    .posts {
      max-width: 100%;
    }

    .chat {
      width: 100%;
      max-width: 550px;
      height: 450px;
    }

    #postBox {
      width: 100%;
      padding: 10px;
    }
  }
</style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">

    <!-- LOGO -->
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="Logo.png" width="50">
      <h2>BOLTX</h2>
    </div>

    <!-- NEW POST -->
    <div onclick="checkPassword()" style="cursor:pointer;text-align:center;">
      <div style="font-size:35px;">+</div>
      <div>New Post</div>
    </div>

    <!-- USER AREA -->
    <div id="userArea">
      <a href="login.html">
        <img src="Signin.png" width="60">
      </a>
    </div>

  </div>

  <hr style="border:1px solid #b000ff;">

  <!-- MAIN -->
  <div class="main">

    <!-- POSTS SECTION -->
    <div class="posts">
      <h2>New</h2>
      <div id="posts"></div>
    </div>

    <!-- CHAT SECTION -->
    <div class="chat">
      <h3 style="text-align:center;">Live Chat</h3>

      <div id="chatMessages" style="flex:1;overflow-y:auto;margin-bottom:10px;"></div>

      <div style="display:flex;gap:10px;">
        <input id="chatInput" placeholder="Send message...">
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <a href="about.html">About</a>
    <a href="privacy.html">Privacy Policy</a>
    <a href="contact.html">Contact</a>
  </div>

  <!-- POST BOX -->
  <div id="postBox" style="display:none;max-width:550px;margin:20px auto;padding:20px;">
    <textarea id="postText" placeholder="Write post..."></textarea>
    <input type="file" id="postImage" accept="image/*">
    <button onclick="addPost()">POST</button>
  </div>

  <!-- SCRIPT -->
  <script>
    let nickname = localStorage.getItem("nickname");

    // USER DISPLAY
    if (nickname) {
      document.getElementById("userArea").innerHTML =
        "<div>" + nickname +
        "<br><small onclick='logout()' style='cursor:pointer;'>Logout</small></div>";
    }

    function logout() {
      localStorage.removeItem("nickname");
      location.reload();
    }

    // NEW POST PASSWORD
    function checkPassword() {
      let password = prompt("Enter Password:");
      if (password === "2626101020112011boltx") {
        document.getElementById("postBox").style.display = "block";
      }
    }

    // LOAD POSTS
    function loadPosts() {
      let posts = JSON.parse(localStorage.getItem("posts")) || [];
      let box = document.getElementById("posts");
      box.innerHTML = "";

      posts.forEach((post, index) => {

        let ownerButtons = "";

        if (post.owner === nickname) {
          ownerButtons = `
            <div class="post-buttons">
              <button onclick="editPost(${index})">Edit</button>
              <button onclick="deletePost(${index})" style="background:red;">Delete</button>
            </div>
          `;
        }

        box.innerHTML += `
          <div class="post">
            <div><b>${post.owner}</b></div>
            <div style="margin-top:8px;">${post.text}</div>
            ${post.image ? `<img src="${post.image}">` : ""}
            ${ownerButtons}
          </div>
        `;
      });
    }

    // ADD POST
    function addPost() {
      let text = document.getElementById("postText").value;
      let file = document.getElementById("postImage").files[0];
      let posts = JSON.parse(localStorage.getItem("posts")) || [];

      if (file) {
        let reader = new FileReader();
        reader.onload = function(e) {
          posts.unshift({
            owner: nickname,
            text: text,
            image: e.target.result
          });
          localStorage.setItem("posts", JSON.stringify(posts));
          loadPosts();
        };
        reader.readAsDataURL(file);
      } else {
        posts.unshift({
          owner: nickname,
          text: text,
          image: ""
        });
        localStorage.setItem("posts", JSON.stringify(posts));
        loadPosts();
      }

      document.getElementById("postText").value = "";
      document.getElementById("postImage").value = "";
      document.getElementById("postBox").style.display = "none";
    }

    // EDIT POST
    function editPost(index) {
      let posts = JSON.parse(localStorage.getItem("posts")) || [];
      let newText = prompt("Edit post:", posts[index].text);

      if (newText !== null) {
        posts[index].text = newText;
        localStorage.setItem("posts", JSON.stringify(posts));
        loadPosts();
      }
    }

    // DELETE POST
    function deletePost(index) {
      let posts = JSON.parse(localStorage.getItem("posts")) || [];
      posts.splice(index, 1);
      localStorage.setItem("posts", JSON.stringify(posts));
      loadPosts();
    }

    // LOAD CHAT
    function loadChat() {
      let messages = JSON.parse(localStorage.getItem("chatMessages")) || [];
      let box = document.getElementById("chatMessages");
      box.innerHTML = "";

      messages.forEach(msg => {
        let mine = msg.name === nickname;

        box.innerHTML += `
          <div style="display:flex;justify-content:${mine ? "flex-end" : "flex-start"};margin-bottom:10px;">
            <div style="background:${mine ? "#b000ff" : "#222"};padding:10px;border-radius:10px;color:white;max-width:70%;">
              <b>${msg.name}</b><br>
              ${msg.text}
            </div>
          </div>
        `;
      });
    }

    // SEND CHAT MESSAGE
    function sendMessage() {
      if (!nickname) {
        alert("Login first");
        return;
      }

      let text = document.getElementById("chatInput").value;
      let messages = JSON.parse(localStorage.getItem("chatMessages")) || [];

      messages.push({
        name: nickname,
        text: text
      });

      localStorage.setItem("chatMessages", JSON.stringify(messages));
      document.getElementById("chatInput").value = "";
      loadChat();
    }

    loadPosts();
    loadChat();
  </script>

</body>
</html>
